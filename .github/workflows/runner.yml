name: 🔗 GHA
on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Repository to use for the build'
        type: string
        default: 'godotengine/godot'
      base-branch:
        description: 'Base branch to use for the builds'
        type: string
        default: '4.6'
      tag:
        description: 'tag to use for downloading the repo'
        type: string
        default: '4.6.1-stable'
      tag_release:
        description: 'tag to use for releasing the build'
        type: string
        default: '4.6.1.stable'
      module_flags:
        description: 'Extra module flags, e.g. module_webm_enabled=no'
        type: string
        default: ''
      template_module_flags:
        description: 'Extra module flags for template build, e.g. disable_3d=yes'
        type: string
        default: 'disable_3d=yes deprecated=no module_bullet_enabled=no module_mobile_vr_enabled=no module_openxr_enabled=no module_webxr_enabled=no module_vhacd_enabled=no module_upnp_enabled=no module_raycast_enabled=no module_theora_enabled=no module_navigation_enabled=no'
      lto:
        description: 'LTO mode. Options: "none", "thin", "full"'
        type: choice
        default: "lto=thin"
        options:
          - "none"
          - "lto=thin"
          - "lto=full"

jobs:
  android-build:
    name: 🤖 Android
    uses: ./.github/workflows/android_builds.yml
    with:
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      lto: ${{ inputs.lto }}
      module_flags: ${{ inputs.module_flags }}
      template_module_flags: ${{ inputs.template_module_flags }}
    secrets: inherit

  ios-build:
    name: 🍏 iOS
    uses: ./.github/workflows/ios_builds.yml
    with:
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      lto: ${{ inputs.lto }}
      module_flags: ${{ inputs.module_flags }}
      template_module_flags: ${{ inputs.template_module_flags }}
    secrets: inherit

  windows-build:
    name: 🏁 Windows
    uses: ./.github/workflows/windows_builds.yml
    with:
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      lto: ${{ inputs.lto == 'lto=thin' && 'lto=none' || inputs.lto }}
      module_flags: ${{ inputs.module_flags }}
      template_module_flags: ${{ inputs.template_module_flags }}
    secrets: inherit

  web-build:
    name: 🌐 Web
    uses: ./.github/workflows/web_builds.yml
    with:
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      lto: ${{ inputs.lto }}
      module_flags: ${{ inputs.module_flags }}
      template_module_flags: ${{ inputs.template_module_flags }}
    secrets: inherit

  release:
    name: 🚀 Create Release
    permissions:
      contents: write
      actions: read
      packages: write
    needs:
      - android-build
      - ios-build
      - windows-build
      - web-build
    uses: ./.github/workflows/release.yml
    with:
      base-branch: ${{ inputs.base-branch }}
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      tag_release: ${{ inputs.tag_release }}
      lto: ${{ inputs.lto }}
      module_flags: ${{ inputs.module_flags }}
      template_module_flags: ${{ inputs.template_module_flags }}
    secrets: inherit
